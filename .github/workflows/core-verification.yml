name: Core Verification

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/core-verification.yml"
      - "Tools/update_godot_version.py"
      - "addons/godo_framework/**"
      - "Verification/Automated/**"
      - "Verification/Package/**"
      - "GoDoFramework.csproj"
      - "GoDoFramework.sln"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Resolve Godot version
        shell: bash
        run: |
          GODOT_VERSION="$(sed -n 's/.*Godot.NET.Sdk\/\([0-9][0-9.]*\).*/\1/p' GoDoFramework.csproj)"
          test -n "$GODOT_VERSION"
          echo "GODOT_VERSION=$GODOT_VERSION" >> "$GITHUB_ENV"
          echo "GODOT_BIN=.godot-ci/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64/Godot_v${GODOT_VERSION}-stable_mono_linux.x86_64" >> "$GITHUB_ENV"

      - name: Download Godot Mono
        shell: bash
        run: |
          curl --fail --location --retry 3 \
            --output godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_mono_linux_x86_64.zip"
          unzip -q godot.zip -d .godot-ci
          chmod +x "$GODOT_BIN"

      - name: Verify Godot version metadata
        run: python Tools/update_godot_version.py --check

      - name: Build core configuration
        run: >-
          dotnet build GoDoFramework.csproj
          -c CoreVerification
          --nologo
          -p:GoDoIncludeGuideInput=false
          -p:GoDoIncludePhantomCamera=false

      - name: Verify clean core package
        run: >-
          python Verification/Automated/run_all.py
          --suite core
          --godot "$GODOT_BIN"
          --timeout 60
