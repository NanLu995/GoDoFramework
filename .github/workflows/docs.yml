name: Documentation

on:
  push:
    branches:
      - master
    paths:
      - ".config/dotnet-tools.json"
      - ".github/workflows/docs.yml"
      - "Docs/**"
      - "addons/**/*.cs"
      - "addons/**/USAGE.md"
      - "GoDoFramework.csproj"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout G.U.I.D.E-CSharp v0.3.7
        uses: actions/checkout@v4
        with:
          repository: Phlegmlee/G.U.I.D.E-CSharp
          ref: 6ef8aa5687398c151a864dafaeb72635d18a0b93
          path: .third-party/guide
          persist-credentials: false

      - name: Checkout Phantom Camera v0.11
        uses: actions/checkout@v4
        with:
          repository: ramokz/phantom-camera
          ref: 17dfc5a2c7040fd6faf0bef758f5f89a92af7ff0
          path: .third-party/phantom-camera
          persist-credentials: false

      - name: Install documentation integration dependencies
        shell: bash
        run: |
          cp -R .third-party/guide/addons/guideCS addons/guideCS
          cp -R .third-party/phantom-camera/addons/phantom_camera addons/phantom_camera

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build and check documentation
        run: python Docs/build_docs.py check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .artifacts/docs/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
